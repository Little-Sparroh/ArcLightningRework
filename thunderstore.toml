[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "ArcLightningRework"
description = "Enhances Scout Laser Rifle Arc Lightning with chaining, turbocharge support, and updated upgrade text."
websiteUrl = "https://github.com/Little-Sparroh/ArcLightningRework"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/ArcLightningRework.dll"
target = "BepInEx/plugins/ArcLightningRework.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]
